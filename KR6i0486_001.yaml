body:
  text: 明古吳藕益釋智旭著經題七字通別合舉人法雙彰經之一字是通名一切大小乘修多羅藏同名經故佛說四十二章六字是別名異眾經故就別名中佛為能說之人四十二章為所說之法佛者梵語具云佛陀此翻覺者謂自覺覺他覺行圓滿自覺不同凡夫覺他不同二乘覺滿不同菩薩即是釋迦牟尼如來萬德慈尊娑婆世界之教主也說者悅所懷也佛以度生為懷機緣未至默然待時機緣既熟應病與藥也四十二章者約數標名葢從一代時教之中摘其最切要最簡明者集為一冊以逗此土機宜所以文略義廣該通四教未可輙判作小乘也後漢迦葉摩騰竺法蘭同譯後漢即東漢對前漢而言之孝明皇帝永平三年歲次庚申帝夢金人項有日光飛來殿庭以問羣臣太史傅毅對曰臣聞西域有神號之為佛陛下所夢其必是乎博士王遵亦奏曰按周書異記載佛誕於周昭王二十六年甲寅時江河泛溢大地皆動五色光貫太微太史蘇由卜之得乾之九五飛龍在天是西方大聖人也後一千年聲教流被此土王命刻石為記埋之南郊後於周穆王時乾坤震動有白虹十二道貫日經天太史扈多占之謂是西方大聖人入滅之象明帝乃於七年歲次甲子勅郎中蔡愔中郎將秦景博士王遵等一十八人西尋佛法至印度國請迦葉摩騰及竺法蘭用白馬䭾經并將舍利及畫佛像以永平十年歲次丁卯至洛陽帝悅造白馬寺譯四十二章經至十四年正月一日五岳道士褚善信等負情不悅表請較試乃於十五日大集白馬寺南門信等以靈寶諸經置道東壇上帝以經像舍利置道西七寶行殿上信等遶壇涕泣啟請天尊詞情懇切以栴檀柴等燒經冀經無損並為灰燼先時升天入火履水隱形等術皆不復驗而佛舍利光明五色直上空中旋環如葢徧覆大眾映蔽日輪摩騰以神足通於虗空中飛行坐臥神化自在天雨寶華及奏眾樂時眾咸喜得未曾有此即佛法入震旦之始也按迦葉摩騰及竺法蘭皆中印度人二名俱不見有翻所云譯者謂以華言易彼梵語令此方之人得解義也世尊成道已作是思惟離欲寂靜是最為勝住大禪定降諸魔道於鹿野苑中轉四諦法輪度憍陳如等五人而證道果復有比丘所說諸疑求佛進止世尊教勅一一開悟合掌敬諾而順尊勅諸經通序皆有六種證信一法體二能聞三機感四教主五處所六同聞所謂如是我聞一時佛在某處等今文次第與通途稍異葢繇佛法初來且順此方文字之體貴在簡略然細繹之六義俱備世尊二字即標教主成道已三字即標機感鹿野苑中即標處所憍陳如等及復有比丘即標能聞及餘同聞法輪教勅即標法體就此一文仍分四節初世尊成道已一句乃總敘一化之繇次從作是思惟至降諸魔道乃追敘成道之法三從於鹿野苑至證道果三句乃別敘法輪之始四從復有比丘至順尊勅乃正敘此經發起也初文世尊者即我釋迦牟尼如來乃天中之天聖中之聖於一切器世間一切眾生世間一切正覺世間獨稱尊也成道者若論世尊實成佛道以來已經不可說微塵數劫如法華經壽量品中所明今為此土有緣眾生故於過去人壽二萬歲時迦葉佛會示居補處位中上生兜率內院以淨天眼觀可化機直至人壽百歲時機緣方熟廼示降神於中印度迦維衛國父名淨飯母名摩耶處胎十月從左脇生一手指天一手指地目顧四方周行七步自言天上天下惟吾獨尊次復示為童子徧學眾藝無不超倫至年二十九歲遊城四門覩老病死及沙門相決志出家子夜踰城金刀剃髮盡棄珍飾披樹神所獻麻衣遊學諸國先從阿藍迦藍習無所有處定不久得證知非究竟捨之而去次從頭藍子習非想非非想處定亦不久得證知非究竟捨之而去見諸外道競修苦行希冀得道各以三年為期終無尅獲將欲度之遂往雪山示修六年苦行每日止食一麻一麥皮骨連立終不成道乃捨苦行受牧女十六轉乳糜之供精氣充足次往熈連河中浴身而出取天帝釋化現童子所施吉祥草詣摩竭提國金剛場菩提樹下敷草結加趺坐以慈心三昧降伏魔軍深入四禪觀察四諦於臘月初八夜明星出時豁然大悟證無漏道是為佛寶初現世間也次文作是思惟等者乃追敘坐樹下時以無師智自然智了知離欲寂靜為勝故先訶棄欲界惡不善法與覺觀俱而入初禪次復離於覺觀內淨一心而入二禪次又離喜而證妙樂入於三禪次又雙棄苦樂捨念清淨入第四禪從四禪中頓發三明破魔王之愛網斷外道之見縛也或初成道句是根本智自證菩提次作是思惟等是後得智重觀四諦以為說法之本寂靜最勝即觀滅諦住大禪定即觀道諦諸魔外道即苦集二諦也第三文中鹿野苑者亦名鹿園在波羅奈國即佛初轉法輪之處轉四諦法輪者苦集滅道名四諦苦是世間之果即指三界六道色心五蘊集是世間之因即指見思煩惱及有漏善惡不動等業滅是出世之果謂因滅故果滅便得寂靜無為安樂道是出世之因謂略則戒定慧廣則三十七品所謂四念處四正勤四如意足五根五力七覺支八正道也此四皆名諦者審實不虗故復名四聖諦者惟有聖智乃證知故佛既證見此四諦理轉令一切眾生咸使聞知從佛後得智中流出法音度入眾生心中故名為輪又輪者摧碾之義以此教法轉破眾生見思諸惑故名為輪說此四諦法輪凡有三轉一者示轉謂此是苦逼迫性此是集招感性此是滅可證性此是道可修性二者勸轉謂此是苦汝應知此是集汝應斷此是滅汝應證此是道汝應修三者證轉謂此是苦我已知此是集我已斷此是滅我已證此是道我已修是為法寶初現世間也憍陳如等五人者一阿濕婆此翻馬勝二䟦提此翻小賢三拘利或名摩訶男此三人皆佛父黨四憍陳如此翻火器五十迦力葉或名婆敷此二人皆佛母舅初太子踰城出家父王思念不置命此五人尋之太子既誓不肯歸五人不敢歸國遂相侍從太子既修苦行二人不堪苦行者先自遁去太子後受美食三人樂苦行者亦復捨去於鹿苑中各修異道佛既成道觀此五人應先得度遂往就之初轉法輪陳如先悟次說布施持戒生天之法訶欲不淨讚歎出離為樂阿濕䟦提尋悟第三說法迦葉拘利亦悟是為僧寶初現世間也第四文中復有比丘等者佛既度此五比丘已次復度耶舍等五十五人三迦葉等一千人舍利弗目犍連等二百人從是以後度人無量咸令成比丘性言比丘者此翻除饉謂其具持二百五十淨戒堪為人世福田除彼眾生因中果上之饑饉也又含三義一破惡二乞士三怖魔所說諸疑求佛進止猶言決擇可否也合掌表於一心聽法不惰不散已上序分下皆正說佛言辭親出家識心達本解無為法名曰沙門常行二百五十戒進止清淨為四真道行成阿羅漢阿羅漢者能飛行變化曠劫壽命住動天地次為阿那含阿那含者壽終靈神上十九天證阿羅漢次為斯陀含斯陀含者一上一還即得阿羅漢次為須陀洹須陀洹者七死七生便證阿羅漢愛欲斷者如四肢斷不復用之此第一章總明沙門果證之差別也欲證沙門四果必須辭親出家識心達本解無為法蓋父母不許則佛法中不聽出家出家而不識心達本則身雖離俗仍縛有為不得名為沙門識心者了知心外無法即悟徧計本空達本者了知心性無實即悟依他如幻解無為法者了知真如與一切法不一不異即證圓成實性梵語沙門此翻勤息謂勤修戒定慧息滅貪瞋癡也常行二百五十戒即增上戒學進止清淨即增上心學為四真道行即增上慧學謂觀察四諦而修道行也阿羅漢具含三義一殺賊二應供三不生乃沙門所證第四無學之果斷盡三界見思二惑飛行變化聊舉六神通之一事曠劫壽命謂三種意生身堪能隨願久住住動天地言羅漢所住之處天神地祇皆為感動或可一行一住皆能震動天地也阿那含此云不還即第三果十九天者從四王天上至無煩為第二十則超過下十九天繇彼已斷欲界九品思惑即於五淨居天中證阿羅漢不復還來欲界也斯陀含此云一來即第二果已斷欲界六品思惑餘三品在故一上欲天一還人中即證阿羅漢也須陀洹此云預流即是初果已斷三界見惑初預聖流不復墮三惡道但欲界九品思惑全在故能更潤七生謂欲界上上品任運貪瞋癡慢能潤二生上中品惑能潤一生上下品惑亦潤一生中上品惑亦潤一生中中品中下品惑共潤一生下上品下中品下下品惑共潤一生七番生死之後方證阿羅漢果此約任運斷者若加行斷則復不定然三界見思雖有多品多類總以愛欲為本愛欲一斷便出苦輪故喻如四肢一斷決不復用也佛言出家沙門者斷欲去愛識自心源達佛深理悟無為法內無所得外無所求心不繫道亦不結業無念無作非修非證不歷諸位而自崇最名之為道此第二章明沙門果證雖有差別而所證之理無差別也斷凡聖同居欲愛識自心源我執本空達佛真諦深理悟生空所顯真如無為之法斷方便有餘欲愛識自心源法執本空達佛俗諦深理悟法空所顯真如無為之法斷實報無障礙欲愛識自心源俱空不生達佛中諦深理悟俱空所顯真如無為之法又了知三土欲愛即空名斷欲去愛識自心源徧計本虗達佛真諦深理一空一切空無假無中而不空悟如來藏如實空義名無為法了知三土欲愛即假名斷欲去愛識自心源依他如幻達佛俗諦深理一假一切假無空無中而不假悟如來藏如實不空義名無為法了知三土欲愛即中名斷欲去愛識自心源圓成本具達佛中諦深理一中一切中無空無假而不中悟如來藏離即離非是即非即義名無為法此無為法本自有之非屬新生故內無所得惟一真心心外無法故外無所求知法如筏故心不繫道已斷惑種故亦不結業證無分別根本實智故無念證不思議後得權智故無作稱性之修修即無修故非修全性作證證無別證故非證諸位如丈尺顯虗空而虗空元非丈尺又如入海雖辨淺深而淺深無非大海故云不歷諸位而自崇最名之為道也藏教則因滅會真滅非真諦故真諦不歷諸位通教即事全真故真諦不歷諸位別教則中道隨緣不變故中道不歷諸位圓教則一色一香無非中道故中道不歷諸位繇上一章方知性不廢修繇今一章方知修不礙性繇上一章方知即而常六繇今一章方知六而常即四教皆論性修皆論六即通此旨者則於一代時教思過半矣佛言剃除鬚髮而為沙門受道法者去世資財乞求取足日中一食樹下一宿慎勿再矣使人愚蔽者愛與欲也此第三章讚歎頭陀勝行以為證道要術也上文既云非修非證恐人錯會執性廢修故今特申抖擻塵勞之行以為斷欲去愛之方譬如古鏡雖復本具光明理須磨拭方得瑩淨耳佛言眾生以十事為善亦以十事為惡何等為十身三口四意三身三者殺盜婬口四者兩舌惡口妄言綺語意三者嫉恚癡如是十事不順聖道名十惡行是惡若止名十善行耳此第四章明善惡無性猶如反掌而生死涅槃惟此三業更非他物也斷他物命名之為殺不與而取名之為盜兩相交會名之為婬鬬亂彼此名為兩舌呪咀罵詈名為惡口心口相違名為妄言無義浮辭名為綺語慳鄙貪欲不耐他榮名之為嫉暴戾殘忍懷恨結怒名之為恚於諸事理旨無所曉名之為癡身口七支唯是業道意地三支屬煩惱道繇惑造業必招苦果長繫三界故不順聖道是惡若止即名十善譬如破闇即是光明泮氷即便成水也然惡既有事惡理惡故翻惡為善亦有事善理善就事善中下品十善為脩羅因中品十善為人道因上品十善為天道因就理善中真諦善為二乘因俗諦善為菩薩因中諦善為佛乘因此三理善俱名上上品十善以行事善者未必能達理善而行理善者必兼圓滿事善故也佛言人有眾過而不自悔頓息其心罪來赴身如水歸海漸成深廣若人有過自解知非改惡行善罪自消滅如病得汗漸有痊損耳此第五章承上止惡行善之意而勸勉改過遷善也有過不悔則如水赴海日深日廣知過必改則如病發汗客邪自除佛言惡人聞善故來擾亂者汝自禁息當無瞋責彼來惡者而自惡之此第六章申明善能勝惡而惡不能破善也上文勸人止惡行善改過遷善恐有愚者畏彼惡人撓亂遂不敢行故誡以慎勿瞋責惡人以惡乃在彼於我無涉故也如明鏡中現於醜容彼容自醜鏡何醜哉倘一生瞋責則反攬彼之惡成我之惡矣佛言有人聞吾守道行大仁慈故致罵佛佛默不對罵止問曰子以禮從人其人不納禮歸子乎對曰歸矣佛言今子罵我我今不納子自持禍歸子身矣猶響應聲影之隨形終無免離慎勿為惡此第七章即上章彼來惡者而自惡之之明證也今人聞罵鮮不發瞋大似領謝帖子正中罵者之計耳思之思之或問佛既大慈何不令罵者無禍耶答曰佛豈欲令其得禍無奈彼人自招禍患今誡以慎勿為惡即是除其禍源慈悲甚矣佛言惡人害賢者猶仰天而唾唾不至天還從己墮逆風揚塵塵不至彼還坌己身賢不可毀禍必滅己此第八章深誡惡人令勿害賢而兼以勗賢人也人若果賢則如天亦如上風豈受唾塵倘可受毀便非賢矣佛言博聞愛道道必難會守志奉道其道甚大此第九章誡勸稟教行人須聞而思思而修不宜但貴口耳之學也博聞者不知隨文入觀惟圖強記名言也愛道者不知道本即心妄於心外取道也守志者念念趨向菩提不雜名利心也奉道者念念體會心源不復向外覓也佛言覩人施道助之歡喜得福甚大沙門問曰此福盡乎佛言譬如一炬之火數千百人各以炬來分取熟食除冥此炬如故福亦如之此第十章明隨喜功德自他兼利福無窮盡也施道有三一資生施謂以財濟其貧窮二無畏施謂於難中拔其憂苦三者法施謂以三學令得四益不惟自行三種施道得福甚多即使見他行施助令歡喜福亦無盡沙門下釋疑恐有愚人正行施時見他隨喜懼他分我功德故以炬火如故曉之蓋不惟無減於我而福報展轉殊勝矣昔有二人採華一自供佛一轉施人供佛以問彌勒彌勒曰自供者成辟支佛果施人者成無上菩提蓋獨樂不若與人與少不若與眾世出世道無不皆然也熟食喻成聖果除冥喻破三障佛言飯惡人百不如飯一善人飯善人千不如飯一持五戒者飯五戒者萬不如飯一須陀洹飯百萬須陀洹不如飯一斯陀含飯千萬斯陀含不如飯一阿那含飯一億阿那含不如飯一阿羅漢飯十億阿羅漢不如飯一辟支佛飯百億辟支佛不如飯一三世諸佛飯千億三世諸佛不如飯一無念無住無修無證之者此第十一章較量福田勝劣不等令人知所歸向也一善勝百惡人顯易可知一持五戒人勝千善人者以世間善人所奉十善僅屬舊醫之法不以三歸為體不成出世津梁若能受三自歸奉持五戒為佛弟子便知四諦四念處門於一生中堪證三果故得千倍勝於常流也一須陀洹勝萬五戒者須陀洹已斷見惑已預聖流故得遠勝內外凡也一斯陀含勝百萬須陀洹者斯陀含已斷欲界六品思惑煩惱漸薄正使百萬住果須陀洹未修勝進行時終不能知二果境界何況能到耶一阿那含勝千萬斯陀含者阿那含已斷欲界思惑九品皆盡正使千萬斯陀含終不能知三果境界況能到耶一阿羅漢勝一億阿那含者萬萬曰億阿羅漢斷盡見思超出三界尤非住三果人能知能到故也辟支佛有二種一者出有佛世稟十二因緣教悟道侵習名為緣覺二者出無佛世觀物幻化自悟無生斷結侵習名為獨覺以阿羅漢但斷正使辟支佛兼侵餘習故一辟支能勝十億阿羅漢也三世諸佛約藏頭佛果言之三大阿僧祇劫修行六度正習皆悉斷盡利益無量眾生故一佛能勝百億辟支佛也無念無住無修無證之者指圓教初住已上亦可兼攝別教初地通教佛地蓋通教體色入空知一切法無性故念即無念住即無住修即無修證即無證至成佛時能於色究竟天示現最高大身統王三千世界別歡喜地圓發心住皆已分證法身皆能示現百界作佛八相成道所以供此一人勝於千億三世諸佛也復次前之八番皆是約田此第九番即是約心蓋未達一切諸法念本無念住本無住修本無修證本無證故於平等法中分勝分劣若了達無念無住無修無證妙理則下自惡人上至諸佛罔非無念無住無修無證之者所以人上佛飯佛施餓狗功德無異維摩以一分奉難勝如來一分施田最下乞人福亦平等若不知福勝劣差別則無以顯修德之足貴若不達生佛本自平等則無以悟性德之淵源是謂常同常別常別常同法界法爾微妙法門佛言人有二十難貧窮布施難豪貴學道難棄命必死難得覩佛經難生值佛世難忍色忍欲難見好不求難被辱不瞋難有勢不臨難觸事無心難廣學博究難除滅我慢難不輕未學難心行平等難不說是非難會善知識難見性學道難隨化度人難覩境不動難善解方便難此第十二章略舉二十難事以為勸誡也順情則易逆情則難然能深發肯心則雖難而易其或但隨流俗則雖易亦難夫貧窮則布施為難故雖少許之施得福甚多不可不勉力也然現見有貧而能施者乃富人反不肯施則慳鄙為何如耶豪貴學道例施可知人所最重者身命誠能棄命則何事不可為者然未聞保命畏死之人果能長生不死則亦何事貪惜耶佛經難覩今幸覩佛經而不研精殫思則與不覩何異佛世難值今幸值佛世而不及時進修則與不值何殊色欲雖恒情所好然或察其味少苦多或觀其如幻如影則亦何難忍制若見好時知其未必可求則貪心自息若被辱時但以情恕理遣則瞋意自平視富貴若草頭露何容以勢臨人觀事境同夢所緣何必勞心措置廣學而不博究如入海無指南針安能會理恃學而生我慢如沃壤以滋稊稗反害良禾佛嘗言四種不可忽一者火雖小不可忽二者龍雖小不可忽三者王子雖小不可忽四者沙門雖小不可忽今有輕未學者未知其不可忽故也心平等則施難勝如來與施最下乞人功德無異泯是非則一切諸法無非佛法是非情見未忘決不能見法界真善知識不見現前一念心之實性決不可以學無上道不學稱性權實之道不能隨化度人未達隨化度人方便安能覩十法界境而一心不動若不能於一一法界中具見一切法界事理何繇善解同體方便故知此二十事後後難於前前也沙門問佛以何因緣得知宿命會其至道佛言淨心守志可會至道譬如磨鏡垢去明存斷欲無求當得宿命此第十三章問意重在宿命答意重在會道葢知宿命者未必會至道而會至道者決能知宿命也沙門問佛何者為善何者最大佛言行道守真者善志與道合者大此第十四章明善莫善於真修大莫大於實證也行道守真則萬善同會志與道合則法界體圓沙門問佛何者多力何者最明佛言忍辱多力不懷惡故兼加安健忍者無惡必為人尊心垢滅盡淨無瑕穢是為最明未有天地逮於今日十方所有無有不見無有不知無有不聞得一切智可謂明矣此第十五章明忍辱力大滅垢明遠也忍有三種一耐怨害忍亦名生忍二安受苦忍亦名法忍三諦察法忍亦名第一義忍今即約耐怨害而入第一義也餘文易知佛言人懷愛欲不見道者譬如澄水致手攪之眾人共臨無有覩其影者人以愛欲交錯心中濁興故不見道汝等沙門當捨愛欲愛欲垢盡道可見矣此第十六章明吾人心水本澄即是至道但繇愛欲所攪故不能於一念中炳現十界影像也捨三界愛欲見思垢盡則真諦道可見捨偏真愛欲塵沙垢盡則俗諦道可見捨果報愛欲無明垢盡則中諦道可見矣佛言夫見道者譬如持炬入冥室中其冥即滅而明獨存學道見諦無明即滅而明常存矣此第十七章深顯無明無性故見道即可永滅亦顯無明未滅不得名真見道也知無明之可滅不致生於退屈知真見之常明亦可祛增上慢矣佛言吾法念無念念行無行行言無言言修無修修會者近爾迷者遠乎言語道斷非物所拘差之毫𨤲失之須臾此第十八章明念行言修皆超有無兩關而不可以有無情見湊泊也念即無念故常念此無念之念豈以不念為無念哉行等三句例此可知會得則觸事全真迷者則轉趨轉遠言語相即解脫相故言語道斷一切物即真如性故非物所拘才涉有無便隔霄壤故差之毫釐才涉思惟便成剩法故失之須臾佛言觀天地念非常觀世界念非常觀靈覺即菩提如是知識得道疾矣此第十九章明唯心識觀遣虗存實也天覆地載凡情計為常住實有今觀天則寒暑代謝地則陵谷遞遷既爾生滅非常豈是心外實法次觀一身之中世為遷流界為方位世固念念不停界亦互對無定於中豈有實我實法此則遣徧計之本虗也次觀現前一念靈覺之性既離我法二執便成四智菩提此則存依圓之實性也遣虗則無增益謗存實則無損減謗非有非無速契中道矣佛言當念身中四大各自有名都無我者我既都無其如幻耳此第二十章示人以四大觀身而入如幻法門也身中堅者名地潤者名水煖者名火動者名風覓我了不可得能成所成體皆如幻能觀所觀亦復如幻於一幻喻便可通達空假中理故知四大觀身實四教之總戶也佛言人隨情欲求於聲名聲名顯著身已故矣貪世常名而不學道枉功勞形譬如燒香雖人聞香香之燼矣危身之火而在其後此第二十一章甚明好名之人不惟無益而且深有損也佛言財色於人人之不捨譬如刀刃有蜜不足一餐之美小兒䑛之則有割舌之患此第二十二章甚明財色之味寡而傷害甚多有智者不可類彼小兒也佛言人繫於妻子舍宅甚於牢獄牢獄有散釋之期妻子無遠離之念情愛於色豈憚驅馳雖有虎口之患心存甘伏投泥自溺故曰凡夫透得此門出塵羅漢此第二十三章深明妻子舍宅之埋沒人而勸以速遠離也欲界以男女眷屬為妻子種種宮殿為舍宅色界以味禪為妻子四禪天為舍宅無色界以癡定為妻子四空天為舍宅愛見所噬患同虎口充類言之二乘以一解脫味為妻子偏真涅槃舍為宅權教以遊戲神通為妻子出真涉俗為舍宅透得空有兩門方成中道無生之果佛言愛欲莫甚於色色之為欲其大無外賴有一矣若使二同普天之人無能為道者矣此第二十四章深明色欲為眾生重病也佛頂經云婬心不除塵不可出佛言愛欲之人猶如執炬逆風而行必有燒手之患此第二十五章甚明愛欲之不可習近也逆風把炬未有不燒手者習近愛欲安得不損淨法身害方便手耶天神獻玉女於佛欲壞佛意佛言革囊眾穢爾來何為去吾不用天神愈敬因問道意佛為解說即得須陀洹果此第二十六章明佛不被魔嬈遂能化魔也天神即魔王波旬佛初成道時先興甲兵不能害佛次獻三女又不能嬈佛乃歸佛化而證初果人能觀彼女人為革囊眾穢則婬意得除自他俱利矣佛言夫為道者猶木在水尋流而行不觸兩岸不為人取不為鬼神所遮不為洄流所住亦不腐敗吾保此木決定入海學道之人不為情欲所惑不為眾邪所嬈精進無為吾保此人必得道矣此第二十七章喻明學道須遠離諸障也兩岸以喻情欲則有見思情欲無明情欲見思情欲耽染生死如觸此岸無明情欲耽染涅槃如觸彼岸人及鬼神以喻眾邪愛網所纏如為人取見網所覆如為鬼神所遮洄流所住正與精進相反腐敗正與無為相反蓋不能直心正念真如每欲進而反退如流急反洄不達無為法性則著相所修福慧終成腐敗故必不為生死涅槃情欲所惑不為愛見眾邪所嬈正念真如而精進了達法性本無為斯得道可保矣佛言慎勿信汝意汝意不可信慎勿與色會色會即禍生得阿羅漢已乃可信汝意此第二十八章深誡意馬難調而色禍宜避也眾生無始以來秖因恣情率意久受輪迴未證阿羅漢常與無明愛見慢俱豈可自信汝意而不事推簡耶佛言慎勿視女色亦莫共言語若與語者正心思念我為沙門處於濁世當如蓮華不為泥汙想其老者如母長者如姊少者如妹稚者如子生度脫心息滅惡念此第二十九章申明遠女防過生善滅惡之方便也先以蓮華不染而自期待則正念自利復視如母如姊如妹如子而度脫之則慈心利他既與二利相應惡念自然息滅佛言夫為道者如被乾草火來須避道人見欲必當遠之此第三十章申誡遠離諸欲勿令為欲火所燒害也六情根猶如乾草六塵境喻若烈火未到心境兩空應修遠離勝行佛言有人患婬不止欲自除陰佛謂之曰若斷其陰不如斷心心如功曹功曹若止從者都息邪心不止斷陰何益佛為說偈欲生於汝意意以思想生二心各寂靜非色亦非行佛言此偈是迦葉佛說此第三十一章申明斷欲須從心斷也斷心之法推此欲從意生意復從思想生只此思想為自生耶他生耶共生耶無因生耶又此思想為在內耶在外耶在兩中間耶為在過去耶現在耶未來耶如是推時思想寂靜思想寂靜故意即寂靜意寂靜故欲即寂靜欲寂靜故觀一切色如鏡像等即是非色觀一切行如泡沫等即是非行從上諸佛展轉傳受不過傳此調心方便而已佛言人從愛欲生憂從憂生怖若離於愛何憂何怖此第三十二章推憂怖之繇愛欲而勸人斷欲去愛也眾生無始以來妄認四大為自身相妄認六塵緣影為自心相執著貪戀不肯暫捨遂生種種憂惱種種恐怖惟以四大觀身知身無我以四運觀心知心無常愛欲既斷憂怖自除佛言夫為道者譬如一人與萬人戰挂鎧出門意或怯弱或半路而退或格鬬而死或得勝而還沙門學道應當堅持其心精進勇銳不畏前境破滅眾魔而得道果此第三十三章喻明為道之人須具戒定慧也專精學道之心譬如一人無始虗妄諸惑習氣譬如萬人受持淨戒譬如挂鎧惟堅持其心則無怯弱之意此戒力也精進勇銳則無半路之退此定力也不畏前境則無格鬬致死此慧力也合此三力破滅無始眾魔而證道果是為得勝而還矣沙門夜誦迦葉佛遺教經其聲悲緊思悔欲退佛問之曰汝昔在家曾為何業對曰愛彈琴佛言絃緩如何對曰不鳴矣絃急如何對曰聲絕矣急緩得中如何對曰諸音普矣佛言沙門學道亦然心若調適道可得矣於道若暴暴即身疲其身若疲意即生惱意若生惱行即退矣其行既退罪必加矣但清淨安樂道不失矣此第三十四章明學道之法須善調身心勿令緩急失所也儒者亦云其進銳者其退速又云勿忘勿助蓋三乘出要類如此佛言如人鍛鐵去滓成器器即精好學道之人去心垢染行即清淨矣此第三十五章喻明垢染不可不除也但除垢染即成清淨所謂但盡凡情別無聖解但有去翳法別無與明法也成佛作祖豈於心外有法可得哉不過淨除習氣而已佛言人離惡道得為人難既得為人去女即男難既得為男六根完具難六根既具生中國難既生中國值佛世難既值佛世遇道者難既得遇道興信心難既興信心發菩提心難既發菩提心無修無證難此第三十六章展轉明難得之事以深警人令勿失良緣也不達無修無證豈名真正發菩提心不發真正菩提豈名信心不興信心豈名遇道既不遇道值佛何益既值猶不值則中國猶之邊方既中國不異邊方則六根具猶不具既六根具猶不具則男子亦非男子既男子不成男子則人身何異惡道靜言思之可不發菩提心急悟無修無證之要旨乎佛言佛子離吾數千里憶念吾戒必得道果在吾左右雖常見吾不順吾戒終不得道此第三十七章深明心近則近心遠則遠而不以形迹論遠近也金口誠言重戒若此末世弟子奈何弗思僧祇律云波羅脂國有二比丘共伴來詣舍衛問訊世尊中路渴乏無水前到一井一比丘汲水便飲一比丘看水見蟲不飲飲水比丘問言汝何不飲答言世尊制戒不得飲蟲水故彼復勸言長老但飲勿令渴死不得見佛答言我寧喪身不毀佛戒遂便渴死即生忉利天上天身具足是夜先到佛所禮足聞法得法眼淨飲水比丘後日乃到佛所佛知而故問汝從何來為有伴否彼即以上事答佛言癡人汝不見我謂得見我彼死比丘已先見我若比丘放逸懈怠不攝諸根雖共我一處彼離我遠彼雖見我我不見彼若有比丘於海彼岸能不放逸精進不懈斂攝諸根雖去我遠我常見彼彼常近我佛問沙門人命在幾間對曰數日間佛言子未知道復問一沙門人命在幾間對曰飯食間佛言子未知道復問一沙門人命在幾間對曰呼吸間佛言善哉子知道矣此第三十八章明人命無常不可不知也一期色心連持不斷名為命根乃依本識種子假立非有實法出息雖存入息難保況剎那剎那念念生滅非沉思諦觀豈能知之昔西域有一國王不信佛法問祖師曰吾見外道種種苦行尚不能折伏婬心而今沙門四事如意豈能斷煩惱耶祖師曰王試取一獄中必死罪人滿器盛油令其手捧用四屠人出刃隨後若能一滴不失便赦其罪若傾一滴隨手斬之同彼遊於四衢王更盡出宮女音樂徧處歌舞試問罪人何所見聞王如其言令一罪人手捧滿油徧歷四衢女樂叢中一滴不墮因赦其罪召而問之汝於四衢何所見聞罪人答曰我於爾時唯恐一滴油墮白刃加頸故惟見手中之油更無他見聞也祖白王曰彼惟惜此一身之死遂於色聲無所見聞何況沙門秉佛無常無我至教痛念無量劫數生死之苦安得不斷煩惱彼外道等不知無常無我徒事苦行故無益耳王乃信服噫誠知人命在呼吸間何俟屠人執刀隨後而心始無放逸哉佛言學佛道者佛所言說皆應信順譬如食蜜中邊皆甜吾經亦爾此第三十九章明佛經皆應信順不應妄分大小頓漸而生輕重心也佛之言教不出權實為實施權開權顯實四教各有四門門門各具四悉今有執小謗大執大謗小執事撥理執理撥事者皆違佛旨者也佛言沙門行道無如磨牛身雖行道心道不行心道若行何用行道此第四十章明行道在心不在形也心不入道徒事外儀與磨牛何異哉佛言夫為道者如牛負重行深泥中疲極不敢左右顧視出離淤泥乃可蘇息沙門當觀情欲甚於淤泥直心念道可免苦矣此第四十一章誡人直心念道當以出離情欲為期也佛言吾視王候之位如過隙塵視金玉之寶如瓦礫視紈素之服如敝帛視大千界如一訶子視阿耨池水如塗足油視方便門如化寶聚視無上乘如夢金帛視佛道如眼前華視禪定如須彌柱視涅槃如晝夕寤視倒正如六龍舞視平等如一真地視興化如四時木此第四十二章結明佛眼等觀一切諸法所以破眾生之法執也人間一百年不過忉利天一晝夜娑婆一大劫不過極樂世界一晝夜則王候榮貴與過隙塵何異諸天器皿純是七寶極樂國地黃金所成彌勒成佛道時此地亦皆瑠璃況金玉瓦礫等是四微所成何足重哉服雖紈素不過蔽形苟可遮羞敝帛何害大千界亦是惟心一訶子亦是惟心觀相元妄故於是中橫計大小觀性元真變大千之心非大非多變訶子之心非小非少也阿耨池水與塗足油例此可知方便門者諸佛所設三乘五乘七九諸方便也眾生稟此法寶尅果不虗然在諸佛不過為實施權豈有實法故但如化寶聚耳無上乘雖云是最實事然皆眾生性具之理心外無法故曰圓滿菩提歸無所得如夢中金帛豈有實物可得哉種種佛道為對凡情凡情不生佛道何有所謂無為無起滅不實如空華也須彌出海風浪不能漂動禪定持心境識不能遷惑然須彌無實法不過四寶四微合成禪定亦無實法不過諸心心所四分合成耳生死如長夜無明所纏故晝夕咸寐涅槃如永日智慧開朗故晝夕咸寤也流轉生死惟是六根安樂涅槃亦惟六根背覺合塵名為倒而實無減背塵合覺名為正而實無增故但如六龍舞不過首尾相換而已諸法既皆平等則隨舉一微塵法即與一真如地平等非離一切法外別有一大總相法門直是頭頭法法無非大總相法門也依一真地而施化道如依大地而有四時之木春生夏榮秋實冬落番番生番番榮番番實番番落終而復始始而復終徧於十方亘於三世皆是如來自在神力也四十二章經指南一卷明道霈述卍云收于佛祖三經指南故不出于此
